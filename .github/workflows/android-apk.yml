name: Construire l'APK Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Restaurer Wav2Lip en cache
        id: cache-wav2lip
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/wav2lip_256.onnx
          key: wav2lip-256-bfeb0ab1-v1

      - name: Télécharger et authentifier Wav2Lip 256
        shell: bash
        run: |
          set -euo pipefail
          model="app/src/main/assets/wav2lip_256.onnx"
          url="https://github.com/instant-high/wav2lip-onnx-256/releases/download/v1.0.0/wav2lip_256.onnx"
          expected="bfeb0ab1ef3097f456f6fdcd506d3b32ee8a42f762a6722b42d0f1ca5b64e83c"
          mkdir -p "$(dirname "$model")"
          if [ ! -f "$model" ]; then
            curl --fail --location --retry 4 --retry-all-errors \
              --output "$model.part" "$url"
            mv "$model.part" "$model"
          fi
          echo "$expected  $model" | sha256sum --check --strict
          test "$(stat --format=%s "$model")" -eq 214402122

      - name: Restaurer Face Landmarker en cache
        id: cache-face-landmarker
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/face_landmarker.task
          key: face-landmarker-478-64184e22-v1

      - name: Télécharger et authentifier Face Landmarker 478 points
        shell: bash
        run: |
          set -euo pipefail
          model="app/src/main/assets/face_landmarker.task"
          url="https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
          expected="64184e229b263107bc2b804c6625db1341ff2bb731874b0bcc2fe6544e0bc9ff"
          mkdir -p "$(dirname "$model")"
          if [ ! -f "$model" ]; then
            curl --fail --location --retry 4 --retry-all-errors \
              --output "$model.part" "$url"
            mv "$model.part" "$model"
          fi
          echo "$expected  $model" | sha256sum --check --strict
          test "$(stat --format=%s "$model")" -eq 3758596

      - name: Restaurer Vosk français en cache
        id: cache-vosk-fr
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/vosk-model-small-fr-0.22.zip
          key: vosk-small-fr-022-cabf6180-v1

      - name: Télécharger et authentifier Vosk français
        shell: bash
        run: |
          set -euo pipefail
          model="app/src/main/assets/vosk-model-small-fr-0.22.zip"
          url="https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip"
          expected="cabf6180e177eb9b3a9a9d43a437bd5e549f3a7d09525e5d69a3fed787be12ad"
          mkdir -p "$(dirname "$model")"
          if [ ! -f "$model" ]; then
            curl --fail --location --retry 4 --retry-all-errors \
              --output "$model.part" "$url"
            mv "$model.part" "$model"
          fi
          echo "$expected  $model" | sha256sum --check --strict
          unzip -t "$model" >/dev/null

      - name: Vérifier les modèles, le traqueur et les phonèmes
        run: |
          python -m json.tool app/src/main/assets/chk_personal_lip_model_v1.json >/dev/null
          python -m json.tool app/src/main/assets/chk_temporal_motion_profile_v4.json >/dev/null
          python -m json.tool app/src/main/assets/chk_personal_dental_profile_v1.json >/dev/null
          python -m json.tool training/model_v4_report.json >/dev/null
          python -m json.tool training/dental_profile_v11_report.json >/dev/null
          python -m json.tool training/new_videos_v4_comparison.json >/dev/null
          python -m json.tool training/blend_mask_v11_calibration.json >/dev/null
          python -m json.tool training/diagnostic_mouth_position_1000121033.json >/dev/null
          python - <<'PY'
          import base64
          import hashlib
          import json
          import zipfile
          from pathlib import Path

          model = json.loads(Path("app/src/main/assets/chk_personal_lip_model_v1.json").read_text())
          assert model["input_size"] == len(model["input_mean"])
          assert model["input_size"] == len(model["input_scale"])
          assert model["version"] == 4
          assert model["name"] == "CHK-Personal-LipMotion-v4-DentalGuarded"
          assert model["training"]["videos_seen"] >= 32
          assert model["training"]["samples"] >= 6500
          assert len(model["audio_features"]) == 6
          previous = model["input_size"]
          for layer in model["layers"]:
              assert layer["rows"] == previous
              assert len(layer["bias"]) == layer["cols"]
              weights = base64.b64decode(layer["weights_q8_base64"])
              assert len(weights) == layer["rows"] * layer["cols"]
              previous = layer["cols"]
          assert previous == 3

          model_report = json.loads(Path("training/model_v4_report.json").read_text())
          anti = model_report["anti_regression"]
          assert anti["candidate_mean_target_mae_not_worse"]
          assert anti["candidate_mean_visual_mae_not_worse"]
          assert all(
              candidate <= baseline
              for candidate, baseline in zip(
                  anti["candidate_target"]["mae"], anti["baseline_target"]["mae"]
              )
          )
          assert all(
              candidate <= baseline
              for candidate, baseline in zip(
                  anti["candidate_visual"]["mae"], anti["baseline_visual"]["mae"]
              )
          )

          dental = json.loads(
              Path("app/src/main/assets/chk_personal_dental_profile_v1.json").read_text()
          )
          assert dental["version"] == 1
          assert dental["training"]["videos_examined"] == 3
          assert dental["training"]["visible_teeth_frames"] >= 50
          assert dental["training"]["source_files_embedded"] is False
          assert 0.75 <= dental["upper_teeth_share_p50"] <= 1.0

          comparison = json.loads(Path("training/new_videos_v4_comparison.json").read_text())
          assert comparison["all_outputs_improved"]
          assert len(comparison["videos"]) == 3
          mask = json.loads(Path("training/blend_mask_v11_calibration.json").read_text())
          assert mask["affected_area_reduction_percent"] >= 80
          assert mask["v11_affected_percent"] < 2.0

          profile = json.loads(Path("app/src/main/assets/chk_temporal_motion_profile_v4.json").read_text())
          assert profile["version"] == 4
          training = profile["training"]
          inference = profile["inference"]
          calibration = profile["calibration"]
          assert training["videos_examined"] >= 28
          assert training["samples_total"] >= 6950
          assert training["diagnostic_outputs_analyzed"] >= 2
          assert inference["look_ahead_frames"] == 14
          assert 0 < inference["attack_factor"] < 1
          assert 0 < inference["release_factor"] < 1
          assert 0 <= inference["closure_strength"] <= 1
          assert calibration["estimated_visual_lag_ms"] >= 500
          assert 520 <= calibration["applied_fallback_look_ahead_ms"] <= 600

          wav2lip = Path("app/src/main/assets/wav2lip_256.onnx")
          assert wav2lip.stat().st_size == 214_402_122
          assert hashlib.sha256(wav2lip.read_bytes()).hexdigest() == (
              "bfeb0ab1ef3097f456f6fdcd506d3b32ee8a42f762a6722b42d0f1ca5b64e83c"
          )

          face_landmarker = Path("app/src/main/assets/face_landmarker.task")
          assert face_landmarker.stat().st_size == 3_758_596
          assert hashlib.sha256(face_landmarker.read_bytes()).hexdigest() == (
              "64184e229b263107bc2b804c6625db1341ff2bb731874b0bcc2fe6544e0bc9ff"
          )

          vosk = Path("app/src/main/assets/vosk-model-small-fr-0.22.zip")
          assert hashlib.sha256(vosk.read_bytes()).hexdigest() == (
              "cabf6180e177eb9b3a9a9d43a437bd5e549f3a7d09525e5d69a3fed787be12ad"
          )
          with zipfile.ZipFile(vosk) as archive:
              assert archive.testzip() is None
              names = archive.namelist()
              assert any("/am/" in name or name.endswith("/am") for name in names)
              assert any("/conf/" in name or name.endswith("/conf") for name in names)
              assert len(names) >= 10

          renderer = Path("app/src/main/java/com/chasmet/lipsync/media/TextureRender.kt").read_text()
          analyzer = Path("app/src/main/java/com/chasmet/lipsync/media/FaceTrackAnalyzer.kt").read_text()
          tracker = Path("app/src/main/java/com/chasmet/lipsync/media/DedicatedLipTracker.kt").read_text()
          lexicon = Path("app/src/main/java/com/chasmet/lipsync/media/FrenchPhonemeLexicon.kt").read_text()
          aligner = Path("app/src/main/java/com/chasmet/lipsync/media/AcousticPhonemeAligner.kt").read_text()
          fusion = Path("app/src/main/java/com/chasmet/lipsync/media/SpeechGuidanceFusion.kt").read_text()
          corrector = Path("app/src/main/java/com/chasmet/lipsync/media/GeneratedFaceRgbaCorrector.kt").read_text()
          mesh = Path("app/src/main/java/com/chasmet/lipsync/media/MediaPipeFaceMeshTracker.kt").read_text()
          guard = Path("app/src/main/java/com/chasmet/lipsync/media/GeneratedMouthQualityGuard.kt").read_text()
          gradle = Path("app/build.gradle.kts").read_text()
          manifest = Path("app/src/main/AndroidManifest.xml").read_text()
          roadmap = Path("ROADMAP_PHONEME_V10.md").read_text()

          assert "mouthHalfMetric" in renderer
          assert "canonicalFaceDelta" in renderer
          assert "setContourMode(FaceDetectorOptions.CONTOUR_MODE_ALL)" in analyzer
          assert ".enableTracking()" not in analyzer
          assert "FaceContour.UPPER_LIP_TOP" in analyzer
          assert "detectForVideo" in mesh
          assert "MIN_LANDMARKS = 468" in mesh
          assert "DentalVisibilityPolicy" in guard
          assert "LipTrackingSource.PREDICTION" in tracker
          assert '"bonjour" to listOf("b", "on", "j", "ou", "r")' in lexicon
          assert "FRAME_US" in aligner
          assert "SEARCH_RADIUS_FRAMES" in aligner
          assert "MAX_ALIGNED_GUIDANCE = 0.88f" in fusion
          assert "MAX_BLEND = 0.58f" in corrector
          assert 'versionName = "0.11.0"' in gradle
          assert "android.permission.INTERNET" not in manifest
          assert "Contre-arguments" in roadmap
          assert "Montreal Forced Aligner" in roadmap

          print(
              f"Moteurs validés : Wav2Lip 256 + Face Landmarker 478 + Vosk français + "
              f"{model['name']} + garde dentaire + aligneur phonétique"
          )
          PY

          if git ls-files | grep -E '\.(mp4|mov|mkv|avi|jpg|jpeg|png|wav)$' >/dev/null; then
            echo "Un média utilisateur ne doit jamais être suivi dans Git" >&2
            exit 1
          fi

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les composants Android
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Installer Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler, tester et vérifier le projet
        id: gradle
        shell: bash
        run: |
          set +e
          gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug :app:lintDebug 2>&1 | tee gradle-output.log
          status=${PIPESTATUS[0]}
          tail -n 300 gradle-output.log > gradle-tail.log
          exit $status

      - name: Publier le diagnostic dans la pull request
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### Diagnostic automatique de la compilation"
            echo
            echo '```text'
            cat gradle-tail.log
            echo '```'
          } > diagnostic.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file diagnostic.md

      - name: Préparer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk LipSync-AI-Studio-v0.11.0.apk

      - name: Publier l'artefact de compilation
        uses: actions/upload-artifact@v4
        with:
          name: LipSync-AI-Studio-v0.11.0
          path: LipSync-AI-Studio-v0.11.0.apk
          if-no-files-found: error
          compression-level: 0

      - name: Publier la version téléchargeable
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.11.0 >/dev/null 2>&1; then
            gh release upload v0.11.0 LipSync-AI-Studio-v0.11.0.apk --clobber
          else
            gh release create v0.11.0 LipSync-AI-Studio-v0.11.0.apk \
              --target "$GITHUB_SHA" \
              --title "LipSync AI Studio v0.11.0 Lèvres et dents personnelles" \
              --notes "Maillage facial MediaPipe 478 points, correction du roulis, masque labial réduit et respect exact des sorties 9:16/16:9. Le modèle personnel v4 et la garde dentaire image par image préservent le sourire, les dents supérieures, la couleur, les détails et la stabilité temporelle. Traitement entièrement local, sans téléversement des vidéos."
          fi
