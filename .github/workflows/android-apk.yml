name: Construire l'APK Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier le modèle neuronal personnel
        run: |
          python -m json.tool app/src/main/assets/chk_personal_lip_model_v1.json >/dev/null
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          model = json.loads(Path("app/src/main/assets/chk_personal_lip_model_v1.json").read_text())
          assert model["input_size"] == len(model["input_mean"])
          assert model["input_size"] == len(model["input_scale"])
          previous = model["input_size"]
          for layer in model["layers"]:
              assert layer["rows"] == previous
              assert len(layer["bias"]) == layer["cols"]
              weights = base64.b64decode(layer["weights_q8_base64"])
              assert len(weights) == layer["rows"] * layer["cols"]
              previous = layer["cols"]
          assert previous == 3
          print(f"Modèle validé : {model['name']} - {model['training']['samples']} exemples")
          PY

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les composants Android
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Installer Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler, tester et vérifier le projet
        id: gradle
        shell: bash
        run: |
          set +e
          gradle --no-daemon :app:testDebugUnitTest :app:assembleDebug :app:lintDebug 2>&1 | tee gradle-output.log
          status=${PIPESTATUS[0]}
          tail -n 250 gradle-output.log > gradle-tail.log
          exit $status

      - name: Publier le diagnostic dans la pull request
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### Diagnostic automatique de la compilation"
            echo
            echo '```text'
            cat gradle-tail.log
            echo '```'
          } > diagnostic.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file diagnostic.md

      - name: Préparer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk LipSync-AI-Studio-v0.3.1.apk

      - name: Publier l'artefact de compilation
        uses: actions/upload-artifact@v4
        with:
          name: LipSync-AI-Studio-v0.3.1
          path: LipSync-AI-Studio-v0.3.1.apk
          if-no-files-found: error

      - name: Publier la version téléchargeable
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.3.1 >/dev/null 2>&1; then
            gh release upload v0.3.1 LipSync-AI-Studio-v0.3.1.apk --clobber
          else
            gh release create v0.3.1 LipSync-AI-Studio-v0.3.1.apk \
              --target "$GITHUB_SHA" \
              --title "LipSync AI Studio v0.3.1" \
              --notes "Correction définitive du format final : suppression de la rotation héritée, orientation imposée selon le choix 9:16 ou 16:9, et vérification automatique du ratio avant l'enregistrement dans la galerie."
          fi
